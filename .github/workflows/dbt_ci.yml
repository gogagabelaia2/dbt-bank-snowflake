name: dbt CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'models/**'
      - 'tests/**'
      - 'macros/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
      - 'packages.yml'
      - 'profiles.yml'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DBT_PROFILES_DIR: .

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      GITHUB_ACTOR: ${{ github.actor }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write private key
        run: |
          mkdir -p ~/.dbt
          echo "$SNOWFLAKE_PRIVATE_KEY" | base64 -d > ~/.dbt/snowflake_private_key.pem
          chmod 600 ~/.dbt/snowflake_private_key.pem

      - name: Install dbt-fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
          echo "$HOME/.dbt/bin" >> $GITHUB_PATH

      - name: dbt deps
        run: dbt deps

      - name: Download production manifest
        uses: actions/download-artifact@v4
        with:
          name: production-manifest
          path: prod-artifacts/
        continue-on-error: true

      - name: dbt build
        run: |
          if [ -f prod-artifacts/manifest.json ]; then
            echo "Slim CI: running modified models only"
            dbt build \
              --select state:modified+ \
              --defer \
              --state ./prod-artifacts \
              --target ci
          else
            echo "No manifest found: running all models"
            dbt build --target ci
          fi