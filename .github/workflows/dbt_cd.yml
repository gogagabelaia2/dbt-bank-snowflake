name: dbt CD

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'tests/**'
      - 'macros/**'
      - 'snapshots/**'
      - 'dbt_project.yml'

env:
  DBT_PROFILES_DIR: .

jobs:
  dbt-cd:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write private key
        run: |
          mkdir -p ~/.dbt
          echo "$SNOWFLAKE_PRIVATE_KEY" > ~/.dbt/snowflake_private_key.pem
          chmod 600 ~/.dbt/snowflake_private_key.pem

      - name: Install dbt-fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
          echo "$HOME/.dbt/bin" >> $GITHUB_PATH

      - name: dbt deps
        run: dbt deps

      - name: dbt build production
        run: dbt build --target dev

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: production-manifest
          path: target/manifest.json
          retention-days: 90