name: 'dbt_bank_snowflake'
version: '1.0.0'
require-dbt-version: ">=1.0.0"

profile: 'dbt_bank_snowflake'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
packages-install-path: "dbt_packages"

on-run-start:
  - "{{ create_audit_log() }}"

models:
  dbt_bank_snowflake:

    staging:
      +materialized: view
      +schema: staging

    intermediate:
      +materialized: ephemeral

    marts:
      +pre-hook:
        - "insert into {{ target.database }}.AUDIT.dbt_audit_log values ('{{ this.name }}', current_timestamp, '{{ target.name }}')"
      +post-hook:
        - "insert into {{ target.database }}.AUDIT.dbt_audit_log values ('{{ this.name }}', current_timestamp, '{{ target.name }}')"

      credit:
        +materialized: table
        +schema: credit

      finance:
        +materialized: table
        +schema: finance

      customers:
        +materialized: table
        +schema: customers

seeds:
  dbt_bank_snowflake:
    +schema: seeds

snapshots:
  dbt_bank_snowflake:
    +schema: snapshots